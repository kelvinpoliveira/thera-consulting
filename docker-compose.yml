version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ovgs-postgres
    environment:
      POSTGRES_USER: ovgs
      POSTGRES_PASSWORD: ovgs
      POSTGRES_DB: ovgs
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ovgs']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ovgs-backend
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://ovgs:ovgs@postgres:5432/ovgs
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ovgs-frontend
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  postgres_data: